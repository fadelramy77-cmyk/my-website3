<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق المسئولين الذكي - هاتف</title>
    
    <!-- مكتبة Tailwind CSS للتصميم العصري -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2c3e50',
                        accent: '#3498db',
                    },
                    fontFamily: {
                        sans: ['Segoe UI', 'Tahoma', 'Geneva', 'Verdana', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- مكتبات Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- مكتبات React و Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .4; transform: scale(1.1); }
        }
        .pulse-active { animation: pulse-slow 2s infinite ease-in-out; }

        /* إعدادات الطباعة الأساسية لضمان الألوان والهوامش */
        @media print {
            @page { margin: 0.5cm; }
            body { 
                background-color: white !important; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
        }
    </style>
</head>
<body class="bg-[#f8f9fa] antialiased font-sans">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // دالة تنظيف الكاش والبيانات القديمة غير المطابقة للمنظومة الجديدة
        const clearOldStaticData = () => {
            try {
                const cachedPersons = localStorage.getItem('local_cached_persons') || localStorage.getItem('smartOrderPersonsList');
                if (cachedPersons) {
                    const parsed = JSON.parse(cachedPersons);
                    // إذا وجدنا مصفوفة نصوص قديمة بدلاً من الكائنات التي تحتوي على PIN، نقوم بتطهير الكاش
                    if (parsed.length > 0 && (typeof parsed[0] === 'string' || !parsed[0].pin)) {
                        console.log("تطهير البيانات القديمة غير المتوافقة...");
                        localStorage.removeItem('local_cached_persons');
                        localStorage.removeItem('smartOrderPersonsList');
                        localStorage.removeItem('local_cached_orders');
                        localStorage.removeItem('smartOrderData_v4');
                    }
                }
            } catch(e) {
                console.error("خطأ أثناء تنظيف البيانات القديمة:", e);
            }
        };
        clearOldStaticData();

        // الإعدادات الافتراضية المباشرة (مطابقة للمشروع الخاص بك لمنع مشاكل الأوفلاين)
        const customFirebaseConfig = {
            apiKey: "AIzaSyD2DSKOWAOgALzvmNIIb_Oj00OoLuFPDqw", 
            authDomain: "order-system-26c71.firebaseapp.com",
            projectId: "order-system-26c71",
            storageBucket: "order-system-26c71.firebasestorage.app",
            messagingSenderId: "974299124203",
            appId: "1:974299124203:web:821e75330a0b434addc9ae"
        };

        // محاولة جلب الإعدادات من البيئة أو الذاكرة المشتركة مع الصفحة الرئيسية
        let firebaseConfig = {};
        try {
            if (customFirebaseConfig && customFirebaseConfig.apiKey) {
                firebaseConfig = customFirebaseConfig;
            } else {
                firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
            }
            
            // قراءة الإعدادات المشتركة التي حفظتها الصفحة الرئيسية بالمتصفح كاحتياطي
            if (!firebaseConfig.apiKey) {
                const sharedConfig = localStorage.getItem('shared_firebase_config');
                if (sharedConfig) {
                    firebaseConfig = JSON.parse(sharedConfig);
                }
            }
        } catch (e) {
            console.error("Firebase config parsing error:", e);
        }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'smart-orders-app';

        let app, auth, db;
        let isFirebaseAvailable = false;

        const initializeFirebaseApp = (config) => {
            if (config && config.apiKey) {
                try {
                    app = firebase.apps.length === 0 ? firebase.initializeApp(config) : firebase.app();
                    auth = firebase.auth();
                    db = firebase.firestore();
                    isFirebaseAvailable = true;
                    return true;
                } catch (e) {
                    console.error("Firebase initialization failed:", e);
                }
            }
            return false;
        };

        initializeFirebaseApp(firebaseConfig);

        function MobileApp() {
            const [user, setUser] = useState(null);
            const [allOrders, setAllOrders] = useState([]);
            const [selectedPerson, setSelectedPerson] = useState(localStorage.getItem('mobile_app_person') || '');
            const [personRole, setPersonRole] = useState(localStorage.getItem('mobile_app_role') || 'تحضير');
            const [searchQuery, setSearchQuery] = useState('');
            const [availablePersons, setAvailablePersons] = useState([]);
            const [isOnline, setIsOnline] = useState(isFirebaseAvailable);
            const [toasts, setToasts] = useState([]); 
            const [showPrintModal, setShowPrintModal] = useState(false);
            const [activePrintOrder, setActivePrintOrder] = useState(null);
            const [loginPin, setLoginPin] = useState('');
            
            // نافذة تعديل إعدادات الاتصال يدوياً في حال تعذر الربط التلقائي
            const [showConfigModal, setShowConfigModal] = useState(false);
            const [tempApiKey, setTempApiKey] = useState(firebaseConfig.apiKey || '');
            const [tempProjectId, setTempProjectId] = useState(firebaseConfig.projectId || '');

            const showToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 3500);
            };

            // مراقبة وحفظ إعدادات الربط اليدوية
            const saveCustomConfig = () => {
                if (!tempApiKey.trim() || !tempProjectId.trim()) {
                    showToast("يرجى إدخال البيانات المطلوبة للربط!", "warning");
                    return;
                }
                const newConfig = {
                    apiKey:"AIzaSyD2DSKOWAOgALzvmNIIb_Oj00OoLuFPDqw",
                    authDomain: "order-system-26c71.firebaseapp.com",
                    projectId:"order-system-26c71",
                    storageBucket: "order-system-26c71.firebasestorage.app",
                    messagingSenderId:"974299124203",
                    appId: "1:974299124203:web:821e75330a0b434addc9ae",
                };
                localStorage.setItem('shared_firebase_config', JSON.stringify(newConfig));
                showToast("تم حفظ الإعدادات! يرجى إعادة تحميل التطبيق للمزامنة.", "success");
                setShowConfigModal(false);
                setTimeout(() => window.location.reload(), 1000);
            };

            useEffect(() => {
                if (!isFirebaseAvailable || !auth) {
                    setIsOnline(false);
                    loadLocalData();
                    return;
                }

                const initAuth = async () => {
                    try {
                        const isCustomConfigUsed = firebaseConfig && firebaseConfig.apiKey && firebaseConfig.apiKey !== "";
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token && !isCustomConfigUsed) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                        setIsOnline(true);
                    } catch (error) {
                        console.error("Auth Error, trying fallback:", error);
                        try {
                            await auth.signInAnonymously();
                            setIsOnline(true);
                        } catch (fallbackError) {
                            console.error("Fallback Auth failed, switching to local mode:", fallbackError);
                            setIsOnline(false);
                            loadLocalData();
                        }
                    }
                };
                initAuth();
                
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (!u) {
                        setIsOnline(false);
                        loadLocalData();
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!isOnline || !user || !db) {
                    loadLocalData();
                    return;
                }

                // مزامنة الأوردرات حية من السحابة بـ docId لضمان التوافق المطلق
                const unsubscribeOrders = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders')
                    .onSnapshot((snapshot) => {
                        const fetchedOrders = [];
                        snapshot.forEach((doc) => {
                            fetchedOrders.push({ docId: doc.id, ...doc.data() });
                        });
                        fetchedOrders.sort((a, b) => (b.timestamp || b.createdAt || 0) - (a.timestamp || a.createdAt || 0));
                        setAllOrders(fetchedOrders);
                        localStorage.setItem('local_cached_orders', JSON.stringify(fetchedOrders));
                    }, (error) => {
                        console.error("Orders load failed, fallback to local:", error);
                        setIsOnline(false);
                        loadLocalData();
                    });

                // مزامنة قائمة المسئولين حية من السحابة (المضافة من الصفحة الرئيسية) بـ docId لضمان التوافق المطلق
                const unsubscribePersons = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('persons')
                    .onSnapshot((snapshot) => {
                        const fetchedPersons = [];
                        snapshot.forEach((doc) => {
                            fetchedPersons.push({ docId: doc.id, ...doc.data() });
                        });
                        setAvailablePersons(fetchedPersons);
                        localStorage.setItem('local_cached_persons', JSON.stringify(fetchedPersons));
                    }, (error) => {
                        console.error("Persons load failed:", error);
                    });

                return () => {
                    unsubscribeOrders();
                    unsubscribePersons();
                };
            }, [user, isOnline]);

            const loadLocalData = () => {
                const cachedOrders = JSON.parse(localStorage.getItem('local_cached_orders')) || 
                                     JSON.parse(localStorage.getItem('smartOrderData_v4')) || [];
                
                const cachedPersons = JSON.parse(localStorage.getItem('local_cached_persons')) || 
                                      JSON.parse(localStorage.getItem('smartOrderPersonsList')) || [];
                
                setAllOrders(cachedOrders);
                setAvailablePersons(cachedPersons);
            };

            const handleLogin = (personName) => {
                if (!personName) {
                    showToast("يرجى اختيار اسم المسئول!", "warning");
                    return;
                }
                const person = availablePersons.find(p => p.name.trim() === personName.trim());
                if (!person) {
                    showToast("لم يتم العثور على حسابك! يرجى مراجعة صفحة الإدارة.", "warning");
                    return;
                }

                if (person.pin && person.pin.toString().trim() !== loginPin.trim()) {
                    showToast("الرقم السري (PIN) غير صحيح! يرجى المحاولة مجدداً", "danger");
                    return;
                }

                setSelectedPerson(person.name);
                setPersonRole(person.role || 'تحضير');
                localStorage.setItem('mobile_app_person', person.name);
                localStorage.setItem('mobile_app_role', person.role || 'تحضير');
                setLoginPin('');
                showToast(`مرحباً بك ${person.name} كـ (مسئول ${person.role || 'تحضير'})`, "success");
            };

            const handleLogout = () => {
                showToast("تم تسجيل خروجك بنجاح", "info");
                setSelectedPerson('');
                localStorage.removeItem('mobile_app_person');
                localStorage.removeItem('mobile_app_role');
            };

            // تعديل دالة تحديث الحالة لحفظ التواريخ الصحيحة المتوافقة مع لوحة التحكم
            const updateStatus = async (docId, newStatus) => {
                const order = allOrders.find(o => o.docId === docId);
                if (order && order.status === 'تم الاستلام') {
                    showToast("⚠️ هذا الأوردر مستلم نهائياً ومقفل، التعديل متاح فقط للإدارة!", "warning");
                    return;
                }

                const now = new Date();
                const y = now.getFullYear();
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                const todayYYYYMMDD = `${y}-${m}-${d}`; // تاريخ اليوم بتنسيق YYYY-MM-DD المطابق لقاعدة البيانات
                
                const timeString = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit' });

                // تجهيز الحقول التي سيتم تحديثها فقط دون تغيير باقي محتوى الطلب
                const updateFields = {
                    status: newStatus,
                    updatedAt: Date.now(),
                    actionTime: timeString
                };

                // إذا كانت الحالة تحولت لتم الاستلام، نغير تاريخ الاستلام فقط ليطابق لوحة تحكم الإدارة
                if (newStatus === 'تم الاستلام') {
                    updateFields.receiveDate = todayYYYYMMDD;
                } else if (newStatus === 'تم التحضير') {
                    updateFields.prepDate = todayYYYYMMDD;
                }

                const updated = allOrders.map(o => {
                    if (o.docId === docId) {
                        return { 
                            ...o, 
                            ...updateFields
                        };
                    }
                    return o;
                });
                
                setAllOrders(updated);
                showToast(`تم تحديث الحالة إلى "${newStatus}"`, "success");

                // تحديث الذاكرة المحلية أولاً لضمان التزامن الفوري
                updateLocalOrder(docId, updateFields, updated);

                if (isOnline && user && db) {
                    try {
                        const orderRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders').doc(docId);
                        await orderRef.update(updateFields);
                    } catch (error) {
                        console.error("Cloud update failed, saved locally:", error);
                    }
                }
            };

            const updateLocalOrder = (docId, updateFields, updatedList) => {
                localStorage.setItem('smartOrderData_v4', JSON.stringify(updatedList));
                
                // تنبيه التبويبات المجاورة بالتغيير
                window.dispatchEvent(new Event('storage'));

                const currentLocalOrders = JSON.parse(localStorage.getItem('local_cached_orders')) || [];
                const cIdx = currentLocalOrders.findIndex(o => o.docId === docId);
                if(cIdx !== -1) {
                    currentLocalOrders[cIdx] = {
                        ...currentLocalOrders[cIdx],
                        ...updateFields
                    };
                    localStorage.setItem('local_cached_orders', JSON.stringify(currentLocalOrders));
                }
            };

            // تحديث منطق تصفية الأوردرات ليعرض كافة الأوردرات لمسئولي التسليم والشامل
            const myOrders = allOrders.filter(o => {
                const showAll = personRole === 'تسليم' || personRole === 'شامل';
                const isMyOrder = showAll || (o.person && o.person.trim() === selectedPerson.trim());
                
                const query = searchQuery.trim().toLowerCase();
                const matchesSearch = query === '' || 
                                      (o.orderNum && o.orderNum.toString().toLowerCase().includes(query)) || 
                                      (o.model && o.model.toLowerCase().includes(query));
                return isMyOrder && matchesSearch;
            });

            const getStatusStyles = (status) => {
                switch(status) {
                    case 'تم الاستلام': return 'bg-[#e2f0d9] text-[#385723] border border-[#c3e6cb]';
                    case 'تم التحضير': return 'bg-[#d1e7dd] text-[#0f5132] border border-[#badbcc]';
                    case 'جاري التحضير': return 'bg-[#cff4fc] text-[#055160] border border-[#b6effb]';
                    default: return 'bg-[#fff3cd] text-[#856404] border border-[#ffeeba]';
                }
            };

            const triggerPrint = (order) => {
                setActivePrintOrder(order);
                setShowPrintModal(true);
                setTimeout(() => {
                    window.print();
                }, 300);
            };

            // ------------------ شاشة الدخول فقط ------------------
            if (!selectedPerson) {
                return (
                    <div className="min-h-screen bg-[#f8f9fa] flex items-center justify-center p-4 relative">
                        {/* زر الإعدادات اليدوية السريعة */}
                        <button onClick={() => setShowConfigModal(true)} className="absolute top-4 right-4 text-slate-400 hover:text-slate-600 transition-all text-xl" title="ضبط إعدادات الربط">
                            <i className="fa-solid fa-gear"></i>
                        </button>

                        <div className="fixed top-4 left-4 right-4 z-50 space-y-2 pointer-events-none max-w-sm mx-auto">
                            {toasts.map(t => (
                                <div key={t.id} className={`p-4 rounded-xl shadow-lg border text-sm font-bold flex items-center gap-2 transition-all ${t.type === 'danger' ? 'bg-red-100 text-red-800 border-red-200' : 'bg-[#fff3cd] text-[#856404] border-[#ffeeba]'}`}>
                                    <span>{t.message}</span>
                                </div>
                            ))}
                        </div>

                        <div className="bg-white p-6 sm:p-8 rounded-2xl shadow-lg w-full max-w-md border-t-8 border-[#2c3e50]">
                            <div className="bg-[#2c3e50] w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-md">
                                <i className="fa-solid fa-lock text-white text-2xl"></i>
                            </div>
                            <h1 className="text-2xl font-black text-center text-[#2c3e50] mb-2">تسجيل الدخول</h1>
                            
                            <p className="text-center text-xs text-slate-500 mb-6 bg-slate-50 p-2 rounded-lg border border-slate-100">
                                يتم إنشاء حسابات المسئولين وصلاحياتهم وتعديلها من خلال لوحة تحكم (الصفحة الرئيسية) فقط.
                            </p>

                            <div className="space-y-4">
                                <div className="flex flex-col gap-1">
                                    <label className="text-xs font-bold text-slate-500">اختر اسمك</label>
                                    <select id="loginUserSelect" className="w-full p-3 border border-slate-200 rounded-xl text-sm outline-none focus:border-[#3498db] bg-white">
                                        <option value="">-- اختر اسمك للبدء --</option>
                                        {availablePersons.map(p => (
                                            <option key={p.docId || p.id} value={p.name}>{p.name} ({p.role || 'تحضير'})</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="flex flex-col gap-1">
                                    <label className="text-xs font-bold text-slate-500">الرقم السري (PIN)</label>
                                    <input type="password" pattern="[0-9]*" inputMode="numeric" placeholder="••••" maxLength="6" value={loginPin} onChange={(e) => setLoginPin(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl text-center text-lg tracking-widest outline-none focus:border-[#3498db]"/>
                                </div>
                                <button onClick={() => handleLogin(document.getElementById('loginUserSelect').value)} className="w-full py-3.5 bg-[#2c3e50] text-white rounded-xl font-bold text-sm hover:bg-[#1a252f] transition-all flex items-center justify-center gap-2 mt-2">
                                    <i className="fa-solid fa-right-to-bracket"></i> تأكيد الدخول
                                </button>
                            </div>

                            {/* مؤشر المزامنة السحابية */}
                            <div className="mt-6 pt-4 border-t border-slate-100 flex items-center justify-between text-[11px] text-slate-400">
                                <span>حالة الاتصال بالسحابة:</span>
                                <span className={`font-bold flex items-center gap-1 ${isOnline ? 'text-emerald-600' : 'text-amber-500'}`}>
                                    <span className={`w-2 h-2 rounded-full ${isOnline ? 'bg-emerald-500' : 'bg-amber-500 animate-pulse'}`}></span>
                                    {isOnline ? 'متصل ومزامن لحّظياً ☁️' : 'أوفلاين (محلي) 💻'}
                                </span>
                            </div>
                        </div>

                        {/* نافذة ضبط إعدادات الـ Firebase يدوياً */}
                        {showConfigModal && (
                            <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl" onClick={(e) => e.stopPropagation()}>
                                    <h3 className="font-black text-lg text-slate-800 mb-2">⚙️ إعدادات ربط السحابة</h3>
                                    <p className="text-xs text-slate-500 mb-4">انسخ الـ apiKey والـ projectId من لوحة تحكم الصفحة الرئيسية لإتمام المزامنة.</p>
                                    
                                    <div className="space-y-3">
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] font-bold text-slate-400">API Key</label>
                                            <input type="text" placeholder="AIzaSy..." value={tempApiKey} onChange={(e) => setTempApiKey(e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-lg text-xs font-mono outline-none" />
                                        </div>
                                        <div className="flex flex-col gap-1">
                                            <label className="text-[10px] font-bold text-slate-400">Project ID</label>
                                            <input type="text" placeholder="my-app-123" value={tempProjectId} onChange={(e) => setTempProjectId(e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-lg text-xs font-mono outline-none" />
                                        </div>
                                    </div>

                                    <div className="flex gap-2 mt-5">
                                        <button onClick={saveCustomConfig} className="flex-1 py-2 bg-[#2c3e50] text-white rounded-lg text-xs font-bold">ربط وحفظ</button>
                                        <button onClick={() => setShowConfigModal(false)} className="flex-1 py-2 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold">إلغاء</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // ------------------ واجهة التطبيق الرئيسية للمسئول المسجل ------------------
            return (
                <div className="min-h-screen bg-[#f8f9fa] pb-20 print:bg-white print:pb-0">
                    
                    <div className="fixed top-4 left-4 right-4 z-50 space-y-2 pointer-events-none max-w-sm mx-auto print:hidden">
                        {toasts.map(t => (
                            <div key={t.id} className={`p-4 rounded-xl shadow-lg border text-sm font-bold flex items-center gap-2 transform transition-all duration-300 ${t.type === 'success' ? 'bg-[#e2f0d9] text-[#385723] border-[#c3e6cb]' : t.type === 'warning' ? 'bg-[#fff3cd] text-[#856404] border-[#ffeeba]' : 'bg-[#cff4fc] text-[#055160] border-[#b6effb]'}`}>
                                <span>{t.message}</span>
                            </div>
                        ))}
                    </div>

                    <div className="print:hidden">
                        <header className="bg-[#2c3e50] text-white p-4 shadow-md sticky top-0 z-10">
                            <div className="flex justify-between items-center mb-4">
                                <div className="flex items-center gap-3">
                                    <div className="bg-white/10 w-10 h-10 rounded-full flex items-center justify-center border border-white/20">
                                        <i className="fa-solid fa-user-shield text-white"></i>
                                    </div>
                                    <div>
                                        <h2 className="text-[10px] text-slate-300 font-bold mb-0.5">صفحة ({personRole})</h2>
                                        <h1 className="font-bold text-sm text-white">{selectedPerson}</h1>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <span className={`w-3 h-3 rounded-full ${isOnline ? 'bg-[#27ae60]' : 'bg-[#f39c12]'} shadow-sm`} title={isOnline ? 'متصل' : 'أوفلاين'}></span>
                                    <button onClick={handleLogout} className="text-white/70 hover:text-white transition-all text-xl" title="خروج آمن">
                                        <i className="fa-solid fa-right-from-bracket"></i>
                                    </button>
                                </div>
                            </div>

                            <div className="relative">
                                <input type="text" placeholder="بحث برقم الأوردر أو الموديل..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-white/10 border border-white/20 text-white placeholder-slate-300 rounded-lg py-2.5 px-10 text-sm outline-none focus:bg-white/20 transition-all text-right" dir="rtl" />
                                <i className="fa-solid fa-magnifying-glass absolute right-3.5 top-3.5 text-slate-300 text-sm"></i>
                            </div>
                        </header>

                        <div className="p-4 space-y-4">
                            {myOrders.length === 0 ? (
                                <div className="text-center py-16 px-4 bg-white rounded-xl shadow-sm border border-slate-200 mt-4">
                                    <i className="fa-solid fa-folder-open text-slate-300 text-4xl mb-4"></i>
                                    <h3 className="text-sm font-bold text-slate-600">لا توجد أوردرات مسجلة لك حالياً</h3>
                                </div>
                            ) : (
                                myOrders.map(order => {
                                    const isLocked = order.status === 'تم الاستلام';
                                    return (
                                        <div key={order.docId || order.id || order.orderNum} className="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden relative">
                                            <div className="bg-[#2c3e50] p-3 text-white flex justify-between items-center">
                                                <div className="flex flex-col">
                                                    <span className="text-[10px] text-slate-300">رقم الأوردر</span>
                                                    <span className="font-bold text-sm tracking-wide">{order.orderNum}</span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => triggerPrint(order)} className="bg-white/10 p-1.5 rounded-md hover:bg-white/25 text-white transition-all text-xs" title="طباعة الأوردر">
                                                        <i className="fa-solid fa-print"></i>
                                                    </button>
                                                    <div className={`px-3 py-1 rounded-md text-[11px] font-bold ${getStatusStyles(order.status || 'معلق')}`}>
                                                        {order.status || 'معلق'}
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="p-3">
                                                <div className="grid grid-cols-2 gap-y-3 gap-x-2 text-sm border-b border-slate-100 pb-3">
                                                    <div className="flex flex-col">
                                                        <span className="text-[10px] text-slate-400 font-bold mb-0.5">الموديل</span>
                                                        <span className="font-bold text-slate-800">{order.model}</span>
                                                    </div>
                                                    <div className="flex flex-col">
                                                        <span className="text-[10px] text-slate-400 font-bold mb-0.5">العدد واللون</span>
                                                        <div className="flex items-center gap-1">
                                                            <span className="font-bold text-slate-800 bg-slate-100 px-1.5 py-0.5 rounded text-xs">{order.qty}</span>
                                                            <span className="font-bold text-slate-600 text-xs">{order.color || '-'}</span>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-2 gap-y-2 gap-x-2 text-xs border-b border-slate-100 py-2.5 text-slate-500">
                                                    <div>تاريخ الطلب: <span className="font-bold text-slate-700">{order.orderDate || '-'}</span></div>
                                                    <div>تاريخ التحضير: <span className="font-bold text-slate-700">{order.prepDate || '-'}</span></div>
                                                    <div className="col-span-2">تاريخ التسليم: <span className="font-bold text-emerald-700">{order.receiveDate || '-'}</span></div>
                                                    <div className="col-span-2">المسئول الحالي: <span className="font-bold text-slate-700">{order.person || 'غير محدد'}</span></div>
                                                </div>

                                                {order.notes && (
                                                    <div className="mt-2 bg-[#f8f9fa] border border-slate-200 rounded-lg p-2 text-xs">
                                                        <span className="font-bold text-slate-500 block mb-1">الملاحظات:</span> 
                                                        <span className="text-slate-700">{order.notes}</span>
                                                    </div>
                                                )}

                                                {isLocked ? (
                                                    <div className="mt-3 bg-red-50 border border-red-200 rounded-lg p-2 text-xs text-red-700 flex items-center justify-center gap-2">
                                                        <i className="fa-solid fa-lock"></i><span>مغلق ومحمي من التعديل</span>
                                                    </div>
                                                ) : (
                                                    <div className="mt-4">
                                                        <div className="flex gap-2">
                                                            {(personRole === 'تحضير' || personRole === 'شامل') && (
                                                                <React.Fragment>
                                                                    <button onClick={() => updateStatus(order.docId, 'جاري التحضير')} className={`flex-1 py-2.5 rounded-lg text-[11px] font-bold transition-all border ${order.status === 'جاري التحضير' ? 'bg-[#cff4fc] text-[#055160] border-[#b6effb] shadow-inner font-extrabold' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}>جاري التحضير</button>
                                                                    <button onClick={() => updateStatus(order.docId, 'تم التحضير')} className={`flex-1 py-2.5 rounded-lg text-[11px] font-bold transition-all border ${order.status === 'تم التحضير' ? 'bg-[#d1e7dd] text-[#0f5132] border-[#badbcc] shadow-inner font-extrabold' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}>تم التحضير</button>
                                                                </React.Fragment>
                                                            )}
                                                            {(personRole === 'تسليم' || personRole === 'شامل') && (
                                                                <button onClick={() => updateStatus(order.docId, 'تم الاستلام')} className="flex-1 py-2.5 rounded-lg text-[11px] font-bold transition-all border bg-emerald-50 hover:bg-emerald-100 border-emerald-200 text-emerald-700">تم الاستلام النهائي</button>
                                                            )}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </div>

                    {showPrintModal && activePrintOrder && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 overflow-y-auto print:static print:bg-white print:p-0 print:block">
                            <div className="bg-white rounded-2xl w-full max-w-lg p-5 print:shadow-none print:w-full print:max-w-none print:p-0">
                                
                                <div className="border-b-2 border-slate-200 pb-3 mb-4 flex justify-between items-center print:hidden">
                                    <h2 className="font-bold text-[#2c3e50] text-base">نافذة تجهيز الطباعة</h2>
                                    <button onClick={() => setShowPrintModal(false)} className="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
                                </div>

                                <div id="printAreaMobile" className="text-right p-4 border border-slate-100 rounded-xl bg-slate-50 print:border-none print:bg-white print:p-0 print:m-0" dir="rtl">
                                    <div className="border-b-2 border-[#2c3e50] pb-2 mb-4 flex justify-between items-center">
                                        <h3 className="font-bold text-lg text-[#2c3e50]">تفاصيل الأوردر</h3>
                                        <span className="text-xs text-slate-500">نظام الملاحظات والطباعة</span>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <div className="text-xs text-slate-400 font-bold mb-1">رقم الأوردر</div>
                                            <div className="p-2.5 bg-white border border-slate-200 rounded-lg font-bold text-sm text-slate-800">{activePrintOrder.orderNum || '-'}</div>
                                        </div>
                                        <div>
                                            <div className="text-xs text-slate-400 font-bold mb-1">رقم التحويلة</div>
                                            <div className="p-2.5 bg-white border border-slate-200 rounded-lg font-bold text-sm text-slate-800">{activePrintOrder.id || '-'}</div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-3 gap-2 mb-4">
                                        <div>
                                            <div className="text-[10px] text-slate-400 font-bold mb-1">الموديل</div>
                                            <div className="p-2 bg-white border border-slate-200 rounded-lg font-bold text-xs text-slate-800 truncate">{activePrintOrder.model || '-'}</div>
                                        </div>
                                        <div>
                                            <div className="text-[10px] text-slate-400 font-bold mb-1">العدد</div>
                                            <div className="p-2 bg-white border border-slate-200 rounded-lg font-bold text-xs text-slate-800">{activePrintOrder.qty || '-'}</div>
                                        </div>
                                        <div>
                                            <div className="text-[10px] text-slate-400 font-bold mb-1">اللون</div>
                                            <div className="p-2 bg-white border border-slate-200 rounded-lg font-bold text-xs text-slate-800 truncate">{activePrintOrder.color || '-'}</div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <div className="text-xs text-slate-400 font-bold mb-1">التصنيف</div>
                                            <div className="p-2.5 bg-white border border-slate-200 rounded-lg font-bold text-sm text-slate-800">{activePrintOrder.type || '-'}</div>
                                        </div>
                                        <div>
                                            <div className="text-xs text-slate-400 font-bold mb-1">الحالة</div>
                                            <div className="p-2.5 bg-[#e8f4fd] border border-[#3498db66] rounded-lg font-bold text-sm text-[#2980b9]">{activePrintOrder.status || 'معلق'}</div>
                                        </div>
                                    </div>

                                    <div className="mb-4">
                                        <div className="text-xs text-slate-400 font-bold mb-1">المسئول الموجه إليه</div>
                                        <div className="p-2.5 bg-white border border-slate-200 rounded-lg font-bold text-sm text-slate-800">{activePrintOrder.person || '-'}</div>
                                    </div>

                                    <div>
                                        <div className="text-xs text-slate-400 font-bold mb-1">الملاحظات</div>
                                        <div className="p-3 bg-white border border-slate-200 rounded-lg text-xs text-slate-700 min-h-[50px]">{activePrintOrder.notes || '-'}</div>
                                    </div>
                                </div>

                                <div className="mt-4 flex gap-3 print:hidden">
                                    <button onClick={() => window.print()} className="flex-1 py-3 bg-[#2c3e50] text-white rounded-xl font-bold text-xs flex items-center justify-center gap-2 hover:bg-[#1a252f] transition-all">
                                        <i className="fa-solid fa-print"></i> طباعة الآن
                                    </button>
                                    <button onClick={() => setShowPrintModal(false)} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold text-xs hover:bg-slate-200 transition-all">
                                        إغلاق النافذة
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MobileApp />);
    </script>
</body>
</html>
